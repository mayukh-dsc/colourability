<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>colourability demo</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #1a1a1a;
        background: #f4f4f5;
      }

      body {
        margin: 0;
        padding: 1.5rem;
      }

      main {
        max-width: 56rem;
        margin: 0 auto;
      }

      .showcase {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        /* stretch makes the figure match the aside height, leaving grey below the image */
        align-items: flex-start;
        margin-bottom: 1.25rem;
      }

      .showcase-left {
        flex: 1 1 16rem;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .showcase-canvas-wrap {
        border-radius: 0.5rem;
        overflow: hidden;
        background: #e4e4e7;
        box-shadow: 0 1px 3px rgb(0 0 0 / 0.08);
      }

      .showcase-canvas-wrap canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .palette {
        flex: 0 1 11rem;
        margin: 0;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: #fff;
        box-shadow: 0 1px 3px rgb(0 0 0 / 0.08);
        border: 1px solid #e4e4e7;
      }

      .palette-video {
        margin: 0 0 0.75rem;
        border-radius: 0.375rem;
        overflow: hidden;
        background: #0a0a0a;
        position: relative;
        /* Full width of the palette; height from Shorts aspect (9:16). max-height + aspect-ratio
           was shrinking the box width and leaving a gutter beside the iframe. */
        width: 100%;
        aspect-ratio: 9 / 16;
      }

      .palette-video iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .palette h2 {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #71717a;
        margin: 0 0 0.5rem;
      }

      .palette-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }

      .palette-item {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        min-width: 0;
      }

      .palette-swatch {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 0.25rem;
        border: 1px solid rgb(0 0 0 / 0.12);
      }

      .palette-label {
        font-size: 0.65rem;
        color: #52525b;
        line-height: 1.2;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 1rem;
      }

      figure {
        margin: 0;
        border-radius: 0.5rem;
        overflow: hidden;
        background: #e4e4e7;
        box-shadow: 0 1px 3px rgb(0 0 0 / 0.08);
      }

      figure img {
        display: block;
        width: 100%;
        height: auto;
      }

      .hint {
        font-size: 0.875rem;
        color: #52525b;
        margin-bottom: 1rem;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }

      .controls button {
        font: inherit;
        font-size: 0.8125rem;
        padding: 0.4rem 0.65rem;
        border: 1px solid #d4d4d8;
        border-radius: 0.375rem;
        background: #fff;
        cursor: pointer;
      }

      .controls button:hover {
        background: #fafafa;
        border-color: #a1a1aa;
      }

      .controls button[aria-pressed="true"] {
        background: #18181b;
        color: #fafafa;
        border-color: #18181b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>colourability demo</h1>
      <p class="hint">
        Colourability applies the same root filter to the whole page, so images, video, canvas, and the rest of the DOM are affected together.
      </p>
      <div class="showcase">
        <div class="showcase-left">
          <figure class="showcase-figure">
            <img
              src="https://cataas.com/cat?width=480&height=480"
              alt="A cat"
              width="480"
              height="480"
            />
          </figure>
          <div class="showcase-canvas-wrap">
            <h5>CanvasPalette</h5>
            <canvas
              id="demo-canvas"
              width="480"
              height="160"
              aria-label="Color grid drawn on canvas"
            ></canvas>
          </div>
        </div>
        <aside class="palette" aria-label="Video and reference colors">
          <h2>Video</h2>
          <div class="palette-video">
            <iframe
              src="https://www.youtube.com/embed/G0rAyAQOtjU"
              title="YouTube Short"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
              loading="lazy"
              referrerpolicy="strict-origin-when-cross-origin"
            ></iframe>
          </div>
          <h2>HTML Palette</h2>
          <div class="palette-grid">
            <div class="palette-item">
              <div class="palette-swatch" style="background: #e11d48"></div>
              <span class="palette-label">Red</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #16a34a"></div>
              <span class="palette-label">Green</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #2563eb"></div>
              <span class="palette-label">Blue</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #eab308"></div>
              <span class="palette-label">Yellow</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #a855f7"></div>
              <span class="palette-label">Purple</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #ea580c"></div>
              <span class="palette-label">Orange</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #14b8a6"></div>
              <span class="palette-label">Cyan</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #f4a7b9"></div>
              <span class="palette-label">Pink</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #78716c"></div>
              <span class="palette-label">Brown</span>
            </div>
            <div class="palette-item">
              <div class="palette-swatch" style="background: #fafafa; border-color: #d4d4d8"></div>
              <span class="palette-label">White</span>
            </div>
          </div>
        </aside>
      </div>
      <div class="controls" id="controls" aria-label="Filter presets"></div>
    </main>
    <script src="/dist/colourability.min.js"></script>
    <script>
      (function () {
        const canvas = document.getElementById("demo-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;
        const colors = [
          "#e11d48",
          "#16a34a",
          "#2563eb",
          "#eab308",
          "#a855f7",
          "#ea580c",
          "#14b8a6",
          "#f4a7b9",
          "#78716c",
          "#fafafa",
        ];
        const cols = 5;
        const rows = 2;
        const w = canvas.width;
        const h = canvas.height;
        const cellW = w / cols;
        const cellH = h / rows;
        colors.forEach(function (color, i) {
          const col = i % cols;
          const row = Math.floor(i / cols);
          ctx.fillStyle = color;
          ctx.fillRect(col * cellW, row * cellH, cellW, cellH);
        });
      })();
    </script>
    <script>
      (function () {
        const controls = document.getElementById("controls");
        if (!controls) return;

        const colourability = new Colourability();

        function formatLabel(name) {
          return name
            .split("-")
            .map(function (part) {
              return part.charAt(0).toUpperCase() + part.slice(1);
            })
            .join(" ");
        }

        function setPressed(name) {
          const buttons = controls.querySelectorAll("button[data-filter]");
          buttons.forEach(function (btn) {
            const v = btn.getAttribute("data-filter");
            btn.setAttribute("aria-pressed", v === name ? "true" : "false");
          });
        }

        colourability.list().forEach(function (name) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.setAttribute("data-filter", name);
          btn.setAttribute("aria-pressed", "false");
          btn.textContent = formatLabel(name);
          btn.addEventListener("click", function () {
            colourability.apply(name);
            setPressed(name);
          });
          controls.appendChild(btn);
        });

        const none = document.createElement("button");
        none.type = "button";
        none.textContent = "None";
        none.addEventListener("click", function () {
          colourability.remove();
          setPressed(null);
        });
        controls.appendChild(none);
      })();
    </script>
  </body>
</html>
